<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dota 2 Analytics – Pro Edition</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Inter', system-ui, sans-serif;
            background: #0b0f18;
            color: #e0e5ef;
            padding: 20px;
            max-width: 1100px;
            margin: 0 auto;
            min-height: 100vh;
        }
        .header {
            text-align: center;
            margin-bottom: 24px;
        }
        .header h1 {
            font-size: 2.4rem;
            font-weight: 700;
            background: linear-gradient(135deg, #c9a84c, #f0c75e);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 6px;
        }
        .load-panel {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin-bottom: 24px;
        }
        .load-panel input {
            padding: 12px 18px;
            background: #1a1f2e;
            border: 1px solid #2d3548;
            border-radius: 10px;
            color: #fff;
            font-size: 1rem;
            width: 220px;
        }
        .load-panel button {
            padding: 12px 28px;
            background: linear-gradient(135deg, #c9a84c, #e0b854);
            border: none;
            border-radius: 10px;
            color: #0b0f18;
            font-weight: 700;
            cursor: pointer;
        }
        .match-info {
            display: flex;
            justify-content: center;
            gap: 30px;
            background: rgba(22,27,40,0.8);
            backdrop-filter: blur(12px);
            border-radius: 16px;
            padding: 16px 28px;
            margin-bottom: 24px;
        }
        .winner { font-size: 1.6rem; font-weight: 700; }
        .radiant-text { color: #66bb6a; }
        .dire-text { color: #ef5350; }
        .duration { color: #9aa0b4; font-weight: 600; }

        /* Team stats cards */
        .team-stats-row {
            display: flex;
            gap: 16px;
            margin-bottom: 24px;
        }
        .team-stats {
            flex: 1;
            background: rgba(22,27,40,0.7);
            border-radius: 14px;
            padding: 14px 18px;
            border: 1px solid rgba(255,255,255,0.05);
        }
        .team-stats h3 { margin-bottom: 10px; }
        .team-stats .stat-line {
            display: flex;
            justify-content: space-between;
            font-size: 0.9rem;
            margin-bottom: 6px;
        }

        /* Swipe graphs */
        .swipe-container {
            display: flex;
            gap: 16px;
            overflow-x: auto;
            scroll-snap-type: x mandatory;
            padding-bottom: 8px;
            margin-bottom: 24px;
        }
        .swipe-card {
            min-width: 280px;
            flex-shrink: 0;
            background: rgba(22,27,40,0.7);
            border-radius: 14px;
            padding: 14px;
            scroll-snap-align: start;
            border: 1px solid rgba(255,255,255,0.05);
        }
        .swipe-card h3 { font-size: 1rem; margin-bottom: 10px; }

        /* Main Win Probability chart */
        .main-graph {
            background: rgba(22,27,40,0.7);
            border-radius: 14px;
            padding: 18px;
            margin-bottom: 24px;
            border: 1px solid rgba(201,168,76,0.2);
        }

        .players-section h2 { margin-bottom: 16px; }
        .team-block { margin-bottom: 24px; }
        .team-label {
            font-weight: 700;
            font-size: 1.2rem;
            margin-bottom: 10px;
        }
        .player-card {
            display: flex;
            align-items: center;
            background: rgba(22,27,40,0.6);
            backdrop-filter: blur(8px);
            border-radius: 12px;
            padding: 12px 16px;
            margin-bottom: 8px;
            gap: 16px;
            border-left: 4px solid transparent;
            cursor: pointer;
            transition: 0.2s;
            opacity: 0;
            transform: translateY(20px);
        }
        .player-card.visible {
            opacity: 1;
            transform: translateY(0);
        }
        .player-card.radiant { border-left-color: #66bb6a; }
        .player-card.dire { border-left-color: #ef5350; }
        .player-card:hover { background: rgba(35,40,55,0.7); }
        .player-card img {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            border: 2px solid #3d4358;
        }
        .player-info { flex: 1; }
        .player-name { font-weight: 700; }
        .impact-badge {
            background: #c9a84c;
            color: #000;
            padding: 2px 8px;
            border-radius: 12px;
            font-weight: 700;
            font-size: 0.8rem;
        }

        /* Hero Sheet Modal */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.85);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        .modal-content {
            background: #1a1f2e;
            border-radius: 18px;
            padding: 24px;
            max-width: 500px;
            width: 90%;
            border: 1px solid rgba(201,168,76,0.3);
            max-height: 80vh;
            overflow-y: auto;
        }

        /* Turning points */
        .turning-points {
            background: rgba(22,27,40,0.7);
            border-radius: 14px;
            padding: 18px;
            margin-bottom: 24px;
        }
        .tp-item {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 8px;
            padding: 8px;
            background: rgba(255,255,255,0.03);
            border-radius: 8px;
        }

        /* Debug modal (unchanged) */
        .debug-overlay { /* ... same as before ... */ }

        @media (max-width: 600px) {
            .team-stats-row { flex-direction: column; }
            .player-card { flex-wrap: wrap; }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>Dota 2 Analytics</h1>
        <p style="color:#7b8299;">Win Probability · Hero Impact · Turning Points</p>
    </div>

    <div class="load-panel">
        <input type="text" id="matchIdInput" placeholder="Match ID" value="7384421746">
        <button id="loadBtn">Load Match</button>
    </div>

    <div id="dynamicContent"></div>

    <!-- Hero Sheet Modal -->
    <div id="heroModal" class="modal-overlay">
        <div class="modal-content" id="heroModalContent"></div>
    </div>

    <!-- Debug Modal (сохранён) -->
    <div id="debugOverlay" class="debug-overlay">
        <div class="debug-modal">
            <h3>⚠️ Произошла ошибка</h3>
            <pre id="debugMessage"></pre>
            <button id="copyErrorBtn">📋 Copy error</button>
            <button id="closeDebugBtn">Закрыть</button>
        </div>
    </div>

    <script>
        // ========== DEBUG & GLOBAL ERROR HANDLING ==========
        function showDebugModal(msg) {
            document.getElementById('debugOverlay').style.display = 'flex';
            document.getElementById('debugMessage').textContent = msg;
        }
        document.getElementById('closeDebugBtn').addEventListener('click', ()=> document.getElementById('debugOverlay').style.display = 'none');
        document.getElementById('copyErrorBtn').addEventListener('click', ()=>{
            navigator.clipboard.writeText(document.getElementById('debugMessage').textContent);
        });
        window.addEventListener('error', e => showDebugModal(e.message));
        window.addEventListener('unhandledrejection', e => showDebugModal(e.reason));

        // ========== GLOBALS ==========
        let heroesMap = null;
        let currentMatch = null;
        let currentGraphData = null;
        let currentPlayers = [];

        // ========== HEROES CACHE ==========
        async function fetchHeroes() {
            if (heroesMap) return heroesMap;
            const resp = await fetch('https://api.opendota.com/api/heroes');
            if (!resp.ok) throw new Error('Heroes load failed');
            const heroes = await resp.json();
            heroesMap = {};
            heroes.forEach(h => {
                heroesMap[h.id] = {
                    localized_name: h.localized_name,
                    name: h.name.replace('npc_dota_hero_', ''),
                    pro_win: h.pro_win || 0,
                    pro_pick: h.pro_pick || 1,
                    pub_win: h.pub_win || 0,
                    pub_pick: h.pub_pick || 1
                };
            });
            return heroesMap;
        }

        function getHeroImageUrl(internalName) {
            return `https://cdn.cloudflare.steamstatic.com/apps/dota2/images/dota_react/heroes/${internalName}.png`;
        }

        // ========== IMPACT SCORE ==========
        function calculateImpact(player) {
            const k = player.kills || 0;
            const d = player.deaths || 1;
            const a = player.assists || 0;
            const gpm = player.gold_per_min || 300;
            const xpm = player.xp_per_min || 400;
            const heroDmg = player.hero_damage || 0;
            const towerDmg = player.tower_damage || 0;

            const kda = (k + a) / d;
            const score = (
                (kda * 12) +
                (gpm / 50) +
                (xpm / 60) +
                (heroDmg / 5000) +
                (towerDmg / 2000)
            );
            return Math.min(100, Math.max(0, Math.round(score)));
        }

        // ========== TURNING POINTS (на основе gold advantage) ==========
        function findTurningPoints(goldAdv) {
            // goldAdv - массив чисел, каждая точка - минута
            const points = [];
            for (let i = 1; i < goldAdv.length; i++) {
                const diff = goldAdv[i] - goldAdv[i-1];
                if (Math.abs(diff) > 1500) { // резкое изменение
                    points.push({ minute: i, swing: diff });
                }
            }
            // Сортировка по абсолютному значению, берём топ 3
            points.sort((a,b) => Math.abs(b.swing) - Math.abs(a.swing));
            return points.slice(0, 3);
        }

        // ========== WIN PROBABILITY (аппроксимация) ==========
        function computeWinProbability(goldAdv) {
            return goldAdv.map(g => 50 + 50 * Math.tanh(g / 3000));
        }

        // ========== RENDER ==========
        function renderAll(match, graphData) {
            currentMatch = match;
            currentGraphData = graphData;
            const container = document.getElementById('dynamicContent');
            if (!match || !match.players) {
                container.innerHTML = '<p style="text-align:center;color:red;">Нет данных</p>';
                return;
            }

            const isRadiantWin = match.radiant_win;
            const duration = `${Math.floor(match.duration/60)}:${(match.duration%60).toString().padStart(2,'0')}`;

            // Группировка игроков
            const radiantPlayers = match.players.filter(p => p.isRadiant);
            const direPlayers = match.players.filter(p => !p.isRadiant);
            currentPlayers = [...radiantPlayers, ...direPlayers];

            // Командная статистика
            const radiantStats = calcTeamStats(radiantPlayers);
            const direStats = calcTeamStats(direPlayers);

            let html = `
                <div class="match-info">
                    <div class="winner ${isRadiantWin?'radiant-text':'dire-text'}">🏆 ${isRadiantWin?'Radiant':'Dire'} Victory</div>
                    <div class="duration">⏱️ ${duration}</div>
                </div>

                <!-- Team Stats -->
                <div class="team-stats-row">
                    <div class="team-stats">
                        <h3 style="color:#66bb6a;">Radiant</h3>
                        <div class="stat-line"><span>Gold</span><span>${(radiantStats.gold/1000).toFixed(1)}k</span></div>
                        <div class="stat-line"><span>XP</span><span>${(radiantStats.xp/1000).toFixed(1)}k</span></div>
                        <div class="stat-line"><span>Kills</span><span>${radiantStats.kills}</span></div>
                        <div class="stat-line"><span>Deaths</span><span>${radiantStats.deaths}</span></div>
                        <div class="stat-line"><span>Assists</span><span>${radiantStats.assists}</span></div>
                    </div>
                    <div class="team-stats">
                        <h3 style="color:#ef5350;">Dire</h3>
                        <div class="stat-line"><span>Gold</span><span>${(direStats.gold/1000).toFixed(1)}k</span></div>
                        <div class="stat-line"><span>XP</span><span>${(direStats.xp/1000).toFixed(1)}k</span></div>
                        <div class="stat-line"><span>Kills</span><span>${direStats.kills}</span></div>
                        <div class="stat-line"><span>Deaths</span><span>${direStats.deaths}</span></div>
                        <div class="stat-line"><span>Assists</span><span>${direStats.assists}</span></div>
                    </div>
                </div>
            `;

            // Main Win Probability (если есть graphData)
            if (graphData && graphData.gold) {
                const wpArray = computeWinProbability(graphData.gold);
                html += `<div class="main-graph"><h3>📈 Win Probability</h3><canvas id="winProbCanvas" height="180"></canvas></div>`;
                // Swipe графики
                html += `<div class="swipe-container" id="swipeContainer"></div>`;
                // Turning points
                const turningPoints = findTurningPoints(graphData.gold);
                if (turningPoints.length > 0) {
                    html += `<div class="turning-points"><h3>⚡ Turning Points</h3>`;
                    turningPoints.forEach(tp => {
                        const dir = tp.swing > 0 ? '+' : '';
                        html += `<div class="tp-item"><span>⏱️ ${tp.minute}:00</span> <span style="color:${tp.swing>0?'#66bb6a':'#ef5350'}">${dir}${(tp.swing/1000).toFixed(1)}k gold swing</span></div>`;
                    });
                    html += `</div>`;
                }
                // Запомним для отложенного создания графиков
                setTimeout(() => {
                    createWinProbabilityChart(wpArray);
                    createSwipeGraphs(graphData);
                }, 50);
            }

            // Players разделённые
            html += `<div class="players-section">`;
            html += renderTeamBlock('Radiant', radiantPlayers);
            html += renderTeamBlock('Dire', direPlayers);
            html += `</div>`;

            container.innerHTML = html;

            // Анимация появления карточек
            document.querySelectorAll('.player-card').forEach((card, idx) => {
                setTimeout(() => card.classList.add('visible'), idx * 80);
            });

            // Модальное окно героя
            document.querySelectorAll('.player-card').forEach(card => {
                card.addEventListener('click', () => {
                    const playerIdx = card.dataset.playerIndex;
                    showHeroSheet(parseInt(playerIdx));
                });
            });
        }

        function renderTeamBlock(teamName, players) {
            return `
                <div class="team-block">
                    <div class="team-label" style="color:${teamName==='Radiant'?'#66bb6a':'#ef5350'}">${teamName}</div>
                    ${players.map((p, idx) => {
                        const hero = heroesMap[p.hero_id];
                        const heroName = hero ? hero.localized_name : 'Unknown';
                        const internalName = hero ? hero.name : 'default';
                        const impact = calculateImpact(p);
                        const globalIdx = currentPlayers.indexOf(p);
                        return `
                        <div class="player-card ${teamName.toLowerCase()}" data-player-index="${globalIdx}">
                            <img src="${getHeroImageUrl(internalName)}" onerror="this.src='https://cdn.cloudflare.steamstatic.com/apps/dota2/images/dota_react/heroes/default.png';">
                            <div class="player-info">
                                <div class="player-name">${p.personaname || 'Аноним'} <span style="color:#8f96ab;">(${heroName})</span></div>
                                <div>KDA: ${p.kills}/${p.deaths}/${p.assists}</div>
                                <span class="impact-badge">Impact ${impact}</span>
                            </div>
                        </div>`;
                    }).join('')}
                </div>`;
        }

        function calcTeamStats(players) {
            return players.reduce((acc, p) => {
                acc.gold += p.net_worth || 0;
                acc.xp += (p.xp_per_min * (currentMatch.duration/60)) || 0;
                acc.kills += p.kills || 0;
                acc.deaths += p.deaths || 0;
                acc.assists += p.assists || 0;
                return acc;
            }, { gold:0, xp:0, kills:0, deaths:0, assists:0 });
        }

        // ========== CHARTS ==========
        function createWinProbabilityChart(wpArray) {
            const ctx = document.getElementById('winProbCanvas')?.getContext('2d');
            if (!ctx) return;
            new Chart(ctx, {
                type: 'line',
                data: {
                    labels: wpArray.map((_,i) => `${i}'`),
                    datasets: [{
                        data: wpArray,
                        borderColor: '#c9a84c',
                        backgroundColor: 'rgba(201,168,76,0.1)',
                        fill: true,
                        tension: 0.3,
                        pointRadius: 0
                    }]
                },
                options: {
                    responsive: true,
                    plugins: { legend: { display: false } },
                    scales: {
                        y: { min: 0, max: 100, ticks: { callback: v => v+'%' } }
                    }
                }
            });
        }

        function createSwipeGraphs(graphData) {
            const container = document.getElementById('swipeContainer');
            if (!container) return;
            const types = [
                { title: '🥇 Gold', data: graphData.gold, color: '#c9a84c' },
                { title: '✨ XP', data: graphData.xp, color: '#5b8def' },
                { title: '⚔️ Kills', data: graphData.kills, color: '#ef5350' },
                { title: '💀 Deaths', data: graphData.deaths, color: '#9aa0b4' },
                { title: '🤝 Assists', data: graphData.assists, color: '#66bb6a' }
            ];

            types.forEach(t => {
                if (!t.data) return;
                const card = document.createElement('div');
                card.className = 'swipe-card';
                card.innerHTML = `<h3>${t.title}</h3><canvas id="chart_${t.title.replace(/\s/g,'')}"></canvas>`;
                container.appendChild(card);
                setTimeout(() => {
                    const ctx = document.getElementById(`chart_${t.title.replace(/\s/g,'')}`)?.getContext('2d');
                    if (ctx) new Chart(ctx, {
                        type: 'line',
                        data: {
                            labels: t.data.map((_,i) => `${i}'`),
                            datasets: [{
                                data: t.data,
                                borderColor: t.color,
                                backgroundColor: t.color+'20',
                                fill: true,
                                tension: 0.2,
                                pointRadius: 0
                            }]
                        },
                        options: {
                            responsive: true,
                            plugins: { legend: { display: false } }
                        }
                    });
                }, 20);
            });
        }

        // ========== HERO SHEET ==========
        async function showHeroSheet(playerIndex) {
            const player = currentPlayers[playerIndex];
            if (!player) return;
            const hero = heroesMap[player.hero_id];
            const heroName = hero?.localized_name || 'Unknown';
            const impact = calculateImpact(player);
            const globalWR = hero ? ((hero.pub_win / hero.pub_pick)*100).toFixed(1) : '?';

            const modal = document.getElementById('heroModal');
            const content = document.getElementById('heroModalContent');
            content.innerHTML = `
                <h2 style="color:#c9a84c;">${player.personaname || 'Игрок'} – ${heroName}</h2>
                <div style="display:flex; align-items:center; gap:16px; margin:16px 0;">
                    <img src="${getHeroImageUrl(hero?.name || 'default')}" style="width:64px; height:64px; border-radius:50%;">
                    <div>
                        <div><strong>Impact Score:</strong> ${impact}/100</div>
                        <div><strong>Hero Global WR:</strong> ${globalWR}%</div>
                        <div><strong>KDA:</strong> ${player.kills}/${player.deaths}/${player.assists}</div>
                    </div>
                </div>
                <div><strong>Net Worth:</strong> ${(player.net_worth/1000).toFixed(1)}k</div>
                <div><strong>GPM/XPM:</strong> ${player.gold_per_min} / ${player.xp_per_min}</div>
                <div style="margin-top:16px;">
                    <button onclick="document.getElementById('heroModal').style.display='none'" style="background:#3a4055; color:#fff; border:none; padding:8px 20px; border-radius:8px;">Закрыть</button>
                    <button id="loadPlayerWR" style="margin-left:10px; background:#c9a84c; border:none; padding:8px 20px; border-radius:8px; color:#000;">Загрузить WR игрока</button>
                </div>
                <div id="playerWRresult" style="margin-top:12px;"></div>
            `;
            modal.style.display = 'flex';

            document.getElementById('loadPlayerWR').addEventListener('click', async () => {
                if (!player.account_id) {
                    document.getElementById('playerWRresult').innerText = 'Нет account_id';
                    return;
                }
                try {
                    const resp = await fetch(`https://api.opendota.com/api/players/${player.account_id}/wl`);
                    const wl = await resp.json();
                    const wr = ((wl.win / (wl.win+wl.lose))*100).toFixed(1);
                    document.getElementById('playerWRresult').innerText = `Win Rate игрока (все герои): ${wr}%`;
                } catch (e) {
                    document.getElementById('playerWRresult').innerText = 'Ошибка загрузки';
                }
            });
        }

        document.getElementById('heroModal').addEventListener('click', (e) => {
            if (e.target === document.getElementById('heroModal')) {
                document.getElementById('heroModal').style.display = 'none';
            }
        });

        // ========== LOAD MATCH ==========
        async function loadMatch(matchId) {
            try {
                document.getElementById('dynamicContent').innerHTML = '<p style="text-align:center;">⏳ Загрузка...</p>';
                await fetchHeroes();
                const [matchResp, graphResp] = await Promise.allSettled([
                    fetch(`https://api.opendota.com/api/matches/${matchId}`),
                    fetch(`https://api.opendota.com/api/matches/${matchId}/graph`)
                ]);
                if (matchResp.status === 'rejected' || !matchResp.value.ok) throw new Error('Матч не найден');
                const match = await matchResp.value.json();
                let graphData = null;
                if (graphResp.status === 'fulfilled' && graphResp.value.ok) graphData = await graphResp.value.json();
                renderAll(match, graphData);
            } catch (err) {
                showDebugModal(err.message);
                document.getElementById('dynamicContent').innerHTML = '<p style="color:red;">Ошибка загрузки</p>';
            }
        }

        document.getElementById('loadBtn').addEventListener('click', () => {
            const id = document.getElementById('matchIdInput').value.trim();
            if (/^\d+$/.test(id)) loadMatch(id);
            else showDebugModal('Неверный Match ID');
        });

        window.addEventListener('load', () => loadMatch('7384421746'));
    </script>
</body>
</html>
