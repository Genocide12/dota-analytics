<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dota 2 Match Analytics</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
</head>
<body>
  <div class="container">
    <h1>Dota 2 Match Analytics</h1>
    <div class="input-group">
      <input type="text" id="matchIdInput" placeholder="Введите Match ID" />
      <button id="loadMatchBtn">Загрузить матч</button>
    </div>
    <div id="loading" class="loading hidden">Загрузка...</div>
    <div id="error" class="error"></div>
    <div id="matchInfo" class="hidden">
      <div class="info-panel">
        <span id="winnerBadge" class="badge"></span>
        <span id="durationLabel"></span>
      </div>

      <div class="pick-ban-section">
        <h3>Пики / Баны</h3>
        <div id="picksContainer" class="hero-grid"></div>
        <div id="bansContainer" class="hero-grid"></div>
      </div>

      <div class="chart-container">
        <h3>Win Probability</h3>
        <canvas id="winProbChart"></canvas>
        <div id="turningPointLabel" class="turning-point-info"></div>
      </div>
      <div class="charts-row">
        <div class="chart-box">
          <h3>Gold Advantage</h3>
          <canvas id="goldChart"></canvas>
        </div>
        <div class="chart-box">
          <h3>XP Advantage</h3>
          <canvas id="xpChart"></canvas>
        </div>
      </div>

      <h3>Игроки</h3>
      <div id="playersContainer" class="players-grid"></div>
    </div>
  </div>
  <script src="app.js"></script>
</body>
</html>
