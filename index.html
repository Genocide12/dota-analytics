<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dota 2 Analytics – Stratz Style</title>
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <!-- Шрифт Inter (как на Stratz) -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Inter', system-ui, sans-serif;
            background: #0b0f18;
            color: #e0e5ef;
            padding: 20px;
            max-width: 1060px;
            margin: 0 auto;
            min-height: 100vh;
        }
        .header {
            text-align: center;
            margin-bottom: 28px;
        }
        .header h1 {
            font-size: 2.4rem;
            font-weight: 700;
            background: linear-gradient(135deg, #c9a84c, #f0c75e);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 6px;
            letter-spacing: -0.5px;
        }
        .header p {
            color: #7b8299;
            font-size: 0.95rem;
        }
        .load-panel {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 12px;
            margin-bottom: 28px;
            flex-wrap: wrap;
        }
        .load-panel input {
            padding: 12px 18px;
            background: #1a1f2e;
            border: 1px solid #2d3548;
            border-radius: 10px;
            color: #fff;
            font-size: 1rem;
            width: 240px;
            font-family: 'Inter', sans-serif;
            transition: border 0.2s;
        }
        .load-panel input:focus {
            outline: none;
            border-color: #c9a84c;
        }
        .load-panel button {
            padding: 12px 28px;
            background: linear-gradient(135deg, #c9a84c, #e0b854);
            border: none;
            border-radius: 10px;
            color: #0b0f18;
            font-weight: 700;
            cursor: pointer;
            font-size: 1rem;
            font-family: 'Inter', sans-serif;
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 4px 14px rgba(201,168,76,0.25);
        }
        .load-panel button:hover {
            transform: translateY(-1px);
            box-shadow: 0 6px 20px rgba(201,168,76,0.4);
        }
        .match-info {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 24px;
            flex-wrap: wrap;
            background: rgba(22, 27, 40, 0.8);
            backdrop-filter: blur(12px);
            border-radius: 16px;
            padding: 18px 28px;
            margin-bottom: 28px;
            border: 1px solid rgba(201,168,76,0.15);
        }
        .winner { font-size: 1.6rem; font-weight: 700; }
        .radiant { color: #66bb6a; text-shadow: 0 0 12px rgba(102,187,106,0.4); }
        .dire { color: #ef5350; text-shadow: 0 0 12px rgba(239,83,80,0.4); }
        .duration { color: #9aa0b4; font-weight: 600; }
        .graphs-section {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            margin-bottom: 32px;
        }
        .graph-card {
            background: rgba(22, 27, 40, 0.7);
            backdrop-filter: blur(10px);
            border-radius: 16px;
            padding: 18px;
            border: 1px solid rgba(255,255,255,0.05);
            box-shadow: 0 8px 24px rgba(0,0,0,0.4);
        }
        .graph-card h3 {
            margin-bottom: 14px;
            font-size: 1rem;
            font-weight: 600;
            color: #cbd5e0;
            letter-spacing: 0.3px;
        }
        .players-section h2 {
            margin-bottom: 18px;
            font-size: 1.5rem;
            font-weight: 700;
            color: #f0e6d2;
        }
        .player-card {
            display: flex;
            align-items: center;
            background: rgba(22, 27, 40, 0.65);
            backdrop-filter: blur(8px);
            border-radius: 14px;
            padding: 14px 18px;
            margin-bottom: 12px;
            gap: 18px;
            border: 1px solid rgba(201,168,76,0.12);
            opacity: 0;
            transform: translateY(20px);
            transition: opacity 0.5s ease, transform 0.5s ease, background 0.2s, border-color 0.2s;
            border-left: 4px solid transparent;
        }
        .player-card.visible {
            opacity: 1;
            transform: translateY(0);
        }
        .player-card:hover {
            background: rgba(30, 35, 52, 0.7);
            border-color: rgba(201,168,76,0.3);
        }
        .player-card.radiant-team { border-left-color: #66bb6a; }
        .player-card.dire-team { border-left-color: #ef5350; }
        .player-card img {
            width: 52px;
            height: 52px;
            border-radius: 50%;
            border: 2px solid #3d4358;
            object-fit: cover;
            background: #141824;
            transition: border-color 0.2s;
        }
        .player-card:hover img { border-color: #c9a84c; }
        .player-info {
            flex: 1 1 200px;
            display: flex;
            flex-direction: column;
            gap: 5px;
        }
        .player-name {
            font-weight: 700;
            font-size: 1.05rem;
            color: #ffffff;
            letter-spacing: -0.2px;
        }
        .hero-name { color: #8f96ab; font-size: 0.85rem; font-weight: 500; }
        .kda { display: flex; gap: 12px; font-weight: 700; font-size: 0.95rem; }
        .kda span {
            background: rgba(255,255,255,0.06);
            padding: 4px 10px;
            border-radius: 8px;
            color: #dde1ed;
        }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(110px, 1fr));
            gap: 8px;
            margin-top: 8px;
        }
        .stat-item {
            background: rgba(0, 0, 0, 0.25);
            border-radius: 8px;
            padding: 8px 10px;
            text-align: center;
            font-size: 0.8rem;
            color: #b9bfcf;
        }
        .stat-item span {
            display: block;
            font-weight: 700;
            color: #fff;
            font-size: 0.9rem;
            margin-top: 2px;
        }

        /* Debug modal */
        .debug-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85);
            align-items: center;
            justify-content: center;
            z-index: 9999;
        }
        .debug-modal {
            background: #1a1e2e;
            border: 2px solid #e05a5a;
            border-radius: 18px;
            padding: 28px;
            max-width: 500px;
            width: 90%;
            color: #fff;
            box-shadow: 0 0 35px rgba(224,90,90,0.3);
            backdrop-filter: blur(12px);
        }
        .debug-modal h3 { color: #ef5350; margin-bottom: 16px; font-weight: 700; }
        .debug-modal pre {
            background: #0d0f18;
            padding: 16px;
            border-radius: 10px;
            overflow-x: auto;
            font-size: 0.9rem;
            white-space: pre-wrap;
            word-break: break-all;
            border: 1px solid #333;
        }
        .debug-modal button {
            margin-top: 16px;
            padding: 10px 22px;
            background: linear-gradient(135deg, #c9a84c, #e0b854);
            border: none;
            border-radius: 10px;
            font-weight: 700;
            cursor: pointer;
            margin-right: 10px;
            font-family: 'Inter', sans-serif;
            transition: opacity 0.2s;
        }
        .debug-modal button:last-child {
            background: #3a4055;
            color: #fff;
        }
        .debug-modal button:hover { opacity: 0.9; }

        @media (max-width: 600px) {
            body { padding: 12px; }
            .player-card {
                flex-direction: column;
                align-items: flex-start;
                gap: 12px;
            }
            .player-card img { align-self: center; }
            .stats-grid { grid-template-columns: repeat(2, 1fr); }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>Dota 2 Analytics</h1>
        <p>Win Probability · Hero Impact · Turning Points</p>
    </div>

    <div class="load-panel">
        <input type="text" id="matchIdInput" placeholder="Match ID (напр. 7384421746)" value="7384421746">
        <button id="loadBtn">Load Match</button>
    </div>

    <div id="dynamicContent"></div>

    <!-- Debug overlay -->
    <div id="debugOverlay" class="debug-overlay">
        <div class="debug-modal">
            <h3>⚠️ Произошла ошибка</h3>
            <pre id="debugMessage"></pre>
            <button id="copyErrorBtn">📋 Copy error</button>
            <button id="closeDebugBtn">Закрыть</button>
        </div>
    </div>

    <script>
        // ========== Глобальный перехват ошибок ==========
        function showDebugModal(message) {
            document.getElementById('debugOverlay').style.display = 'flex';
            document.getElementById('debugMessage').textContent = message;
        }
        function hideDebugModal() {
            document.getElementById('debugOverlay').style.display = 'none';
        }
        document.getElementById('closeDebugBtn').addEventListener('click', hideDebugModal);
        document.getElementById('copyErrorBtn').addEventListener('click', () => {
            const text = document.getElementById('debugMessage').textContent;
            navigator.clipboard.writeText(text).then(() => alert('Текст скопирован в буфер обмена'));
        });
        window.addEventListener('error', e => {
            showDebugModal(`Необработанная ошибка:\n${e.message}\nФайл: ${e.filename}:${e.lineno}`);
        });
        window.addEventListener('unhandledrejection', e => {
            showDebugModal(`Необработанное отклонение промиса:\n${e.reason}`);
        });

        // ========== Кэш героев ==========
        let heroesMap = null; // { id: { localized_name, name } }

        async function fetchHeroes() {
            if (heroesMap) return heroesMap;
            try {
                const resp = await fetch('https://api.opendota.com/api/heroes');
                if (!resp.ok) throw new Error('Ошибка загрузки героев');
                const heroes = await resp.json();
                heroesMap = {};
                heroes.forEach(h => {
                    heroesMap[h.id] = {
                        localized_name: h.localized_name,
                        name: h.name.replace('npc_dota_hero_', '') // npc_dota_hero_sniper -> sniper
                    };
                });
                return heroesMap;
            } catch (err) {
                showDebugModal('Ошибка загрузки героев: ' + err.message);
                throw err;
            }
        }

        // Надёжный URL портрета через внутреннее имя
        function getHeroImageUrl(internalName) {
            return `https://cdn.cloudflare.steamstatic.com/apps/dota2/images/dota_react/heroes/${internalName}.png`;
        }

        // ========== Рендер матча ==========
        function renderMatch(match, graphData) {
            const container = document.getElementById('dynamicContent');
            if (!match || !match.players) {
                container.innerHTML = '<p style="text-align:center;color:#ef5350;">Нет данных о матче</p>';
                return;
            }

            const isRadiantWin = match.radiant_win;
            const durationMin = Math.floor(match.duration / 60);
            const durationSec = match.duration % 60;
            const durationStr = `${durationMin}:${durationSec.toString().padStart(2, '0')}`;

            let html = `
                <div class="match-info">
                    <div class="winner ${isRadiantWin ? 'radiant' : 'dire'}">🏆 Winner: ${isRadiantWin ? 'Radiant' : 'Dire'}</div>
                    <div class="duration">⏱️ ${durationStr}</div>
                </div>
            `;

            // Графики (если доступны)
            if (graphData && graphData.gold && graphData.xp) {
                html += `
                <div class="graphs-section">
                    <div class="graph-card"><h3>🥇 Gold Advantage</h3><canvas id="goldChart" height="180"></canvas></div>
                    <div class="graph-card"><h3>✨ XP Advantage</h3><canvas id="xpChart" height="180"></canvas></div>
                </div>`;
            }

            html += `<div class="players-section"><h2>👥 Players</h2><div id="playersContainer"></div></div>`;
            container.innerHTML = html;

            // Заполняем игроков
            const playersContainer = document.getElementById('playersContainer');
            match.players.forEach(p => {
                const hero = heroesMap[p.hero_id];
                const heroLocalName = hero ? hero.localized_name : 'Unknown';
                const heroInternalName = hero ? hero.name : 'default';
                const teamClass = p.isRadiant ? 'radiant-team' : 'dire-team';

                const card = document.createElement('div');
                card.className = `player-card ${teamClass}`;
                card.innerHTML = `
                    <img src="${getHeroImageUrl(heroInternalName)}" alt="${heroLocalName}" loading="lazy"
                         onerror="this.onerror=null; this.src='https://cdn.cloudflare.steamstatic.com/apps/dota2/images/dota_react/heroes/default.png';">
                    <div class="player-info">
                        <div class="player-name">${p.personaname || 'Аноним'} <span class="hero-name">(${heroLocalName})</span></div>
                        <div class="kda">
                            <span>K:${p.kills}</span><span>D:${p.deaths}</span><span>A:${p.assists}</span>
                        </div>
                    </div>
                    <div class="stats-grid">
                        <div class="stat-item">Net Worth<span>${(p.net_worth / 1000).toFixed(1)}k</span></div>
                        <div class="stat-item">GPM<span>${p.gold_per_min}</span></div>
                        <div class="stat-item">XPM<span>${p.xp_per_min}</span></div>
                        <div class="stat-item">Hero DMG<span>${(p.hero_damage / 1000).toFixed(1)}k</span></div>
                        <div class="stat-item">Tower DMG<span>${(p.tower_damage / 1000).toFixed(1)}k</span></div>
                    </div>
                `;
                playersContainer.appendChild(card);
            });

            // Анимация появления
            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        entry.target.classList.add('visible');
                        observer.unobserve(entry.target);
                    }
                });
            }, { threshold: 0.15 });
            document.querySelectorAll('.player-card').forEach(card => observer.observe(card));

            // Графики
            if (graphData && graphData.gold && graphData.xp) {
                createChart('goldChart', 'Gold Advantage', graphData.gold, '#c9a84c', 'rgba(201,168,76,0.08)');
                createChart('xpChart', 'XP Advantage', graphData.xp, '#5b8def', 'rgba(91,141,239,0.08)');
            }
        }

        function createChart(canvasId, label, data, borderColor, bgColor) {
            const ctx = document.getElementById(canvasId).getContext('2d');
            new Chart(ctx, {
                type: 'line',
                data: {
                    labels: Array.from({length: data.length}, (_, i) => `${i}'`),
                    datasets: [{
                        label: label,
                        data: data,
                        borderColor: borderColor,
                        backgroundColor: bgColor,
                        fill: true,
                        tension: 0.25,
                        pointRadius: 0,
                        borderWidth: 2
                    }]
                },
                options: {
                    responsive: true,
                    plugins: { legend: { display: false } },
                    scales: {
                        x: { ticks: { color: '#7b8299', maxTicksLimit: 10 } },
                        y: { ticks: { color: '#7b8299', callback: v => (v/1000).toFixed(1)+'k' } }
                    }
                }
            });
        }

        // ========== Загрузка матча ==========
        async function loadMatch(matchId) {
            try {
                document.getElementById('dynamicContent').innerHTML = '<p style="text-align:center;color:#a0a6b8;">⏳ Загрузка матча...</p>';
                await fetchHeroes(); // гарантируем кэш героев

                const [matchResp, graphResp] = await Promise.allSettled([
                    fetch(`https://api.opendota.com/api/matches/${matchId}`),
                    fetch(`https://api.opendota.com/api/matches/${matchId}/graph`)
                ]);

                if (matchResp.status === 'rejected' || !matchResp.value.ok) {
                    throw new Error(`Матч не найден (HTTP ${matchResp.value?.status || 'ошибка сети'})`);
                }
                const match = await matchResp.value.json();

                let graphData = null;
                if (graphResp.status === 'fulfilled' && graphResp.value.ok) {
                    graphData = await graphResp.value.json();
                }

                renderMatch(match, graphData);
            } catch (error) {
                showDebugModal(`Ошибка загрузки матча:\n${error.message}`);
                document.getElementById('dynamicContent').innerHTML = '<p style="text-align:center;color:#ef5350;">Не удалось загрузить матч</p>';
            }
        }

        // Привязка кнопки и автозагрузка
        document.getElementById('loadBtn').addEventListener('click', () => {
            const id = document.getElementById('matchIdInput').value.trim();
            if (!/^\d+$/.test(id)) {
                showDebugModal('Введите корректный числовой Match ID');
                return;
            }
            loadMatch(id);
        });

        window.addEventListener('load', () => {
            const defaultId = '7384421746';
            document.getElementById('matchIdInput').value = defaultId;
            loadMatch(defaultId);
        });
    </script>
</body>
</html>
