<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dota 2 Analytics</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
</head>
<body>
  <div class="app">
    <header class="header">
      <h1 class="logo">Dota 2 <span>Analytics</span></h1>
      <div class="lang-switch">
        <button id="langToggle" class="lang-btn">EN</button>
      </div>
      <p class="subtitle" id="subtitle">Вероятность победы • Влияние героев • Переломные моменты</p>
    </header>

    <main class="main">
      <div class="search-bar">
        <input type="text" id="matchIdInput" placeholder="Введите Match ID" class="search-input" />
        <button id="loadMatchBtn" class="search-btn">Загрузить матч</button>
      </div>

      <div id="loading" class="loading hidden">Анализируем матч...</div>
      <div id="error" class="error hidden"></div>

      <div id="matchInfo" class="match-info hidden">
        <div class="match-header">
          <span id="winnerBadge" class="badge"></span>
          <span id="durationLabel" class="duration"></span>
        </div>

        <div class="chart-container">
          <h3 id="winProbTitle">Вероятность победы</h3>
          <canvas id="winProbChart"></canvas>
          <div id="turningPointLabel"></div>
        </div>

        <div class="charts-row">
          <div class="chart-box">
            <h3 id="goldAdvTitle">Преимущество по золоту</h3>
            <canvas id="goldChart"></canvas>
          </div>
          <div class="chart-box">
            <h3 id="xpAdvTitle">Преимущество по опыту</h3>
            <canvas id="xpChart"></canvas>
          </div>
        </div>

        <div class="players-section">
          <h3 id="playersTitle">Игроки</h3>
          <div id="playersContainer" class="players-grid"></div>
        </div>
      </div>
    </main>
  </div>
  <script src="app.js"></script>
</body>
</html>
